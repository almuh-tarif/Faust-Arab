                if (type === 'login') isLoginCaptchaVerified = true;
                if (type === 'faucet') isFaucetCaptchaVerified = true;
                if (type === 'shortlink') isShortlinkCaptchaVerified = true;
            }, 2500);
        }

        function resetCaptchaWidget(type) {
            let boxElement = document.getElementById(type + '-captcha-box');
            if(boxElement) {
                boxElement.className = "captcha-checkbox-ui";
                if (type === 'login') isLoginCaptchaVerified = false;
                if (type === 'faucet') isFaucetCaptchaVerified = false;
                if (type === 'shortlink') isShortlinkCaptchaVerified = false;
            }
        }

        function handleLogin() {
            if (!isLoginCaptchaVerified) { alert('من فضلك أكد أولاً أنك لست برنامج روبوت بالنقر على المربع!'); return; }
            const email = document.getElementById('fp-email').value.trim();
            if(!email || !email.includes('@')) { alert('يرجى إدخال بريد إلكتروني صحيح ومطابق لمحفظة FaucetPay!'); return; }
            localStorage.setItem('f_arab_user', email);
            if(window.location.search.includes('ref=')) { isReferred = true; }
            updateUI(); switchPage('dashboard-page'); checkHourlyFaucet();
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('page-active'));
            document.getElementById(pageId).classList.add('page-active');
            document.getElementById('success-navigation-options').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function switchTab(contentId, btnId) {
            document.getElementById('dash-content').style.display = 'none';
            document.getElementById('ref-content').style.display = 'none';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(contentId).style.display = 'block';
            document.getElementById(btnId).classList.add('active');
        }

        function updateUI() {
            document.getElementById('user-balance').innerText = balance.toFixed(3);
            document.getElementById('user-tasks').innerText = tasksDone;
            const user = localStorage.getItem('f_arab_user');
            if(user) {
                document.getElementById('display-wallet').innerText = user;
                document.getElementById('ref-link-display').innerText = window.location.href.split('?')[0] + "?ref=" + btoa(user).substring(0,8);
            }

            let withdrawBtn = document.getElementById('withdraw-btn');
            if(balance >= minWithdrawalLimit) {
                withdrawBtn.style.opacity = '1'; withdrawBtn.style.cursor = 'pointer'; withdrawBtn.disabled = false;
                withdrawBtn.innerText = "💸 إرسال طلب سحب الأرباح الآن ($" + balance.toFixed(3) + ")";
                withdrawBtn.style.backgroundColor = "#10b981"; 
            } else {
                withdrawBtn.style.opacity = '0.5'; withdrawBtn.style.cursor = 'not-allowed'; withdrawBtn.disabled = true;
                withdrawBtn.innerText = "سحب الأرباح إلى FaucetPay (الحد الأدنى $" + minWithdrawalLimit.toFixed(2) + ")";
                withdrawBtn.style.backgroundColor = "#ef4444";
            }
        }

        function requestManualWithdrawal() {
            if(balance < minWithdrawalLimit) return;
            const userEmail = localStorage.getItem('f_arab_user');
            const withdrawAmount = balance.toFixed(3);
            balance = 0.000;
            localStorage.setItem('f_arab_bal', balance);
            updateUI();
            const subject = encodeURIComponent("طلب سحب يدوي جديد - منصة Faust Arab");
            const body = encodeURIComponent("مرحباً بمدير المنصة،\n\nيرجى معالجة طلب الدفع اليدوي للمستفيد أدناه:\n\nبريد حساب FaucetPay للمستخدم: " + userEmail + "\nالمبلغ المطلوب تحويله وصافيه: $" + withdrawAmount + "\n\nتحياتنا، نظام الأمان البرمجي الذاتي.");
            window.location.href = "mailto:" + adminEmail + "?subject=" + subject + "&body=" + body;
            triggerGlobalAlert("تم إنشاء تذكرة السحب! يرجى إرسال الرسالة البريدية المنبثقة لإتمام المراجعة وتحويل الرصيد.");
        }

        function startShortlinkProcess() {
            currentStep = 1; switchPage('shortlink-page'); runStepTimer();
        }

        function runStepTimer() {
            const status = document.getElementById('timer-status');
            const btn = document.getElementById('skip-action-btn');
            document.getElementById('shortlink-captcha-wrapper').style.display = 'none'; 
            resetCaptchaWidget('shortlink');
            document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
            document.getElementById('step-' + currentStep + '-dot').classList.add('active');
            document.getElementById('shortlink-title').innerText = "العقدة الحالية " + currentStep + " / 3";
            btn.style.display = 'none'; let sec = 6; 
            const countdown = setInterval(() => {
                sec--;
                status.innerText = "جاري تشفير الاتصال وحساب البيانات (العقدة " + currentStep + ")... يرجى الانتظار " + sec + " ثوانٍ";
                if(sec <= 0) {
                    clearInterval(countdown);
                    status.innerText = "العقدة " + currentStep + " تتطلب تأكيد هويتك البشرية للمتابعة!";
                    document.getElementById('shortlink-captcha-wrapper').style.display = 'flex';
                    btn.innerText = currentStep === 3 ? "تأكيد العقدة وحصد الرصيد المالي" : "تأكيد العقدة والعبور للمرحلة التالية";
                    btn.style.display = 'block';
                }
            }, 1000);
        }

        function handleStepTransition() {
            if(!isShortlinkCaptchaVerified) { alert("يرجى النقر وتأكيد خيار الكابتشا (أنا لست برنامج روبوت) أولاً لفتح واجهة العبور!"); return; }
            if(currentStep < 3) { currentStep++; runStepTimer(); } 
            else { addFunds(rewardPerLink); showSuccessNav("+$0.001"); document.getElementById('shortlink-captcha-wrapper').style.display = 'none'; }
        }

        function repeatInfiniteProcess() {
            document.getElementById('success-navigation-options').style.display = 'none'; startShortlinkProcess();
        }

        function checkHourlyFaucet() {
            let nextClaim = localStorage.getItem('f_arab_next_faucet');
            if (nextClaim) {
                if (new Date().getTime() < nextClaim) {
                    disableFaucetBtn(); runFaucetTimerUI(nextClaim);
                    document.getElementById('faucet-captcha-wrapper').style.display = 'none';
                } else { localStorage.removeItem('f_arab_next_faucet'); initFaucetClaimUI(); }
            } else { initFaucetClaimUI(); }
        }

        function initFaucetClaimUI() {
            document.getElementById('faucet-captcha-wrapper').style.display = 'flex';
            resetCaptchaWidget('faucet');
        }

        function claimHourlyFaucet() {
            if(!isFaucetCaptchaVerified) { alert("يرجى التحقق من صندوق الكابتشا للتأكد من هويتك البشرية!"); return; }
            addFunds(rewardHourlyFaucet);
            let claimTime = new Date().getTime() + (60 * 60 * 1000); 
            localStorage.setItem('f_arab_next_faucet', claimTime);
            triggerGlobalAlert("تهانينا! تمت إضافة مكافأة الميجا الساعية ($0.005) إلى حسابك.");
            disableFaucetBtn(); runFaucetTimerUI(claimTime);
            document.getElementById('faucet-captcha-wrapper').style.display = 'none';
        }

        function disableFaucetBtn() {
            let btn = document.getElementById('faucetClaimBtn');
            if(btn) { btn.disabled = true; btn.innerText = "الرجاء العودة والمطالبة بعد انتهاء الساعة"; }
        }

        function runFaucetTimerUI(endTime) {
            let timerInterval = setInterval(function() {
                let distance = endTime - new Date().getTime();
                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById('faucetTimerDisplay').innerHTML = "جاهز للمطالبة الآن!";
                    let btn = document.getElementById('faucetClaimBtn');
                    if(btn) { btn.disabled = false; btn.innerText = "🎁 المطالبة بالمكافأة الساعية ($0.005)"; }
                    localStorage.removeItem('f_arab_next_faucet'); initFaucetClaimUI(); return;
                }
                let m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let s = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('faucetTimerDisplay').innerHTML = (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);
            }, 1000);
        }

        function addFunds(amount) {
            balance += amount; tasksDone++;
            localStorage.setItem('f_arab_bal', balance); localStorage.setItem('f_arab_tasks', tasksDone);
            updateUI();
        }

        function showSuccessNav(text) {
            document.getElementById('timer-status').innerHTML = "<span style='color:var(--success-color);'>🎉 رائع جداً! تم احتساب المهمة وإضافة " + text + " لشرائح موازنتك.</span>";
            document.getElementById('skip-action-btn').style.display = 'none';
            document.getElementById('success-navigation-options').style.display = 'flex';
        }

        function triggerGlobalAlert(text) {
            const ab = document.getElementById('global-reward-alert');
            ab.innerText = text; ab.style.display = 'block';
            setTimeout(() => { ab.style.display = 'none'; }, 4000);
        }

        window.onload = function() {
            const user = localStorage.getItem('f_arab_user');
            if(user) { updateUI(); switchPage('dashboard-page'); checkHourlyFaucet(); }
        }
    </script>
</body>
</html>
